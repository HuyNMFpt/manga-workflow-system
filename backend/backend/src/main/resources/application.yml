spring:
  application:
    name: manga-workflow-system

  datasource:
    url: jdbc:mysql://localhost:3306/manga_swp391?createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: manga-swp391-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html